<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      /* Redirect if already logged in */
      const token = localStorage.getItem("token");
      if (token) {
        window.location.href = "/";
      }
    </script>
  </head>

  <body class="flex items-center justify-center min-h-screen bg-slate-900">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-[400px]">
      <h2 class="text-2xl text-white font-bold mb-6 text-center">Login</h2>

      <input
        id="email"
        type="email"
        placeholder="Enter Email"
        class="w-full mb-4 p-3 rounded bg-slate-700 text-white"
      />

      <input
        id="password"
        type="password"
        placeholder="Enter Password"
        class="w-full mb-6 p-3 rounded bg-slate-700 text-white"
      />

      <button
        onclick="loginUser()"
        class="w-full bg-emerald-500 hover:bg-emerald-400 text-white py-3 rounded"
      >
        Login
      </button>

      <p id="msg" class="text-center mt-4 text-sm text-red-400"></p>

      <p class="text-center mt-4 text-slate-300">
        Don't have an account?
        <a href="/register.html" class="text-emerald-400 hover:underline">
          Register here
        </a>
      </p>
    </div>

    <script>
      async function loginUser() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (!email || !password) {
          document.getElementById("msg").innerText =
            "Email and password required";
          return;
        }

        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!data.status) {
            document.getElementById("msg").innerText = data.message;
            return;
          }

          /* Save token */
          localStorage.setItem("token", data.data.accessToken);

          /* Redirect to booking page */
          window.location.href = "/";
        } catch (error) {
          document.getElementById("msg").innerText =
            "Login failed: " + error.message;
        }
      }
    </script>
  </body>
</html>
